# **GitHub Actions workflow** `.github/workflows/ci.yml` в `rust-mini-cli`:
#     триггер на push, матрица `os: [ubuntu-latest, macos-latest]`,
#     шаги
#       — `actions/checkout`, установка toolchain (`rustup` / `dtolnay/rust-toolchain` с компонентами `clippy`, `rustfmt`),
#     затем `cargo build --verbose`, `cargo test --verbose`, `cargo clippy -- -D warnings`, `cargo fmt --check`.
#     Expected: workflow закоммичен и запушен.
# - [ ] **CI прошёл зелёным** — проверить во вкладке Actions репо `Isotere/rust-mini-cli`, оба job'а (ubuntu + macos) зелёные.
# Если красный — починить (формат / clippy warnings) до зелёного.
# Expected: green checkmark на последнем коммите.

name: Rust-Mini-CLI-CI
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on: [push]
jobs:
    Build:
        runs-on: [ubuntu-latest, macos-latest]
        strategy:
            matrix:
                BUILD_TARGET: [release] # refers to a cargo profile
        steps:
            - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
            - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
            - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
            - name: Check out repository code
              uses: actions/checkout@v6
            - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
            - name: Build binaries in "${{ matrix.BUILD_TARGET }}" mode
              run: cargo build --profile ${{ matrix.BUILD_TARGET }}
            - name: Run tests in "${{ matrix.BUILD_TARGET }}" mode
              run: cargo test --profile ${{ matrix.BUILD_TARGET }}
